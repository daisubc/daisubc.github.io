  - Artificial Intelligence
  - Industrial Automation
  - Machine Learning
  - Fault Diagnosis

learning_outcomes:
  - "Explain how LLM agents work and critically evaluate claims about their capabilities."
  - "Build simple LLM agents for process engineering tasks using standard tools."
  - "Recognize current LLM applications in process design, control, and simulation."
  - "Identify the key challenges — safety validation, hallucination, integration — that must be addressed for industrial deployment."
  - "Articulate open research problems and opportunities in this emerging field."

target_audience:
  - "Academic researchers and graduate students in process control and process systems engineering exploring AI applications."
  - "Industry practitioners — control engineers, automation specialists, and technology developers — evaluating LLM tools."
  - "Research managers and technical leaders assessing the technology for their organizations."

prerequisites: |
  Participants should understand basic process control concepts (feedback loops, PIDs, cascade control) and
  have some familiarity with machine learning ideas (training, inference, overfitting). Prior experience with
  LLMs or Python programming is helpful but not required — the morning sessions provide necessary background
  and hands-on exercises can be completed collaboratively. Attendees who prefer to observe rather than code
  are also welcome.

hands_on:
  bring:
    - "A laptop (required — you will work directly with LLM APIs on Python notebooks during the session)."
    - "Ability to connect to the workshop Wi-Fi."
  provided:
    - "Jupyter notebooks and starter code."
    - "Access to LLMs for the duration of the session."
    - "Sample datasets: simplified P&IDs, alarm lists, maintenance logs."
    - "Offline backup — pre-recorded demos and local notebooks using open-source models — in case of connectivity issues."
  exercises:
    - title: "Prompt engineering basics"
      description: "Prompt a model to interpret a simplified P&ID and critique its control structure suggestions. Experiment with different prompting strategies."
    - title: "Building a simple agent"
      description: "Construct a minimal fault diagnosis agent that combines an LLM with tool calls to query sensor data and search maintenance logs."
    - title: "Failure analysis"
      description: "Probe agent limitations — numerical reasoning errors, hallucinated equipment names, overconfident recommendations — to develop intuition for where these systems fail."

schedule:
  - block: "Morning — Foundations & Applications"
    sessions:
      - time: "9:00 – 9:15"
        title: "Welcome and Framing"
        lead: "Prof. Bhushan Gopaluni, Prof. Mehmet Mercangöz, Prof. Chunhui Zhao"
        details: "Overview of the day, learning outcomes, and an introduction to where LLM agent technology stands in the process industries."
      - time: "9:15 – 10:15"
        title: "LLM and Agent Fundamentals"
        lead: "Prof. Bhushan Gopaluni"
        details: "Attention mechanism and transformer architecture; introduction to simple agent architectures via process control examples (alarm lists, operator procedures, simplified P&ID encodings)."
      - time: "10:15 – 10:30"
        title: "☕ Coffee Break"
        lead: ""
        details: ""
        break: true
      - time: "10:30 – 11:30"
        title: "Application I — Process Design and Engineering"
        lead: "Prof. Bhushan Gopaluni"
        details: "P&ID interpretation, control structure prediction, and automated design review. Discussion of Hirtreiter et al. (2024), Balhorn et al. (2024), and graph-based approaches for capturing process topology."
      - time: "11:30 – 12:30"
        title: "Application II — Process Simulation and Optimization"
        lead: "Prof. Bhushan Gopaluni & Prof. Chunhui Zhao"
        details: "Automated simulation configuration, multimodal approaches combining process measurements with text and images, and natural language interfaces for querying process historians and generating analysis reports."
      - time: "12:30 – 13:30"
        title: "🥢 Lunch"
        lead: ""
        details: ""
        break: true
  - block: "Afternoon — Applications, Open Problems & Hands-On"
    sessions:
      - time: "13:30 – 14:30"
        title: "Application III — Autonomous Control and Fault Diagnosis"
        lead: "Prof. Mehmet Mercangöz & Prof. Chunhui Zhao"
        details: "Agentic frameworks for industrial automation: LLM-based fault diagnosis integrating sensor data with maintenance history, autonomous agents that reason about process upsets, integration of LLM agents with digital twins, and industrial control system integration — delivered jointly by Prof. Mehmet Mercangöz and Prof. Chunhui Zhao."
      - time: "14:30 – 14:45"
        title: "☕ Coffee Break"
        lead: ""
        details: ""
        break: true
      - time: "14:45 – 15:45"
        title: "Hands-On Session — Build, Break & Debug Simple LLM Agents"
        lead: "Prof. Bhushan Gopaluni, Prof. Mehmet Mercangöz, Prof. Chunhui Zhao"
        details: "Participants work directly with LLM APIs on process control tasks using provided Python notebooks. Three exercises progressing from prompt engineering through agent construction to failure analysis."
      - time: "15:45 – 16:45"
        title: "Open Problems, Research Directions, and Q&A"
        lead: "Prof. Bhushan Gopaluni, Prof. Mehmet Mercangöz, Prof. Chunhui Zhao — with all participants"
        details: "Structured discussion: What works now? What's tractable? What's hard? Followed by an open floor for questions about content, research directions, industrial deployment, and collaboration."
      - time: "16:45 – 17:00"
        title: "Wrap-up and Resources"
        lead: "Prof. Bhushan Gopaluni, Prof. Mehmet Mercangöz, Prof. Chunhui Zhao"
        details: "Synthesis of the day's themes plus pointers to resources for continued learning — key papers, open-source tools, benchmark datasets, and community forums."

