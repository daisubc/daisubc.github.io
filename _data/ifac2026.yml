      Directs the Data Analytics and Intelligent Systems (DAIS) Lab, focusing on machine learning,
      reinforcement learning, and data analytics for process industries. Author of over 200 refereed
      publications. Recipient of the UBC Killam Teaching Prize and the D.G. Fisher Award from the
      Canadian Society for Chemical Engineering. Extensive experience organizing IFAC workshops,
      including sessions at ADCHEM and DYCOPS.
