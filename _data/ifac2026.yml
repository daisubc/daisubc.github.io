    secondary: "Sargent Centre for Process Systems Engineering"
    location: "London, United Kingdom"
    photo: "/assets/img/ifac2026/mehmet.jpg"
    profile_url: "https://profiles.imperial.ac.uk/m.mercangoz"
    sessions: "Application III (Autonomous Control & Fault Diagnosis, jointly with Prof. Zhao) · Hands-On · Open Problems"
    bio: |
      Spent 14 years at ABB Corporate Research, most recently as coordinator for industrial
      artificial intelligence, before joining Imperial College. His combination of academic
      research and industrial R&D experience uniquely positions him to address the practical
      challenges of deploying LLM agents in industrial settings. Current research focuses on
      agentic frameworks that leverage LLMs for autonomous industrial control with appropriate
      safety guarantees.
