abstract: |
  Large Language Models have evolved from text generators to agents that reason, use tools, and take actions.
  Researchers are now applying these agents to process industries: interpreting flowsheets, predicting control
  structures, diagnosing faults, even acting as autonomous operators. The results so far are intriguing but
  preliminary, and the gap between laboratory demonstrations and plant deployment remains substantial.

  This full-day workshop brings together researchers from three continents to examine what LLM agents can
  actually do today, where they fail, and what problems deserve our attention. The morning covers the
  fundamentals of LLMs and agents and surveys applications in process design and process simulation. The
  afternoon turns to autonomous control and fault diagnosis, followed by a hands-on session in which
  participants build simple agents and probe their limitations. We close with an open discussion aimed at
  identifying research priorities.

  Participants will leave with practical experience, a grounded assessment of the technology, and ideas
  for their own work.

why_now: |
  LLMs have moved past the initial hype phase, and the process control community now has enough published
  work and practical experience to evaluate what actually works. At the same time, the technology is still
  immature enough that we can shape its development rather than simply adopt tools designed for other domains.

  Plants generate vast amounts of unstructured text — maintenance logs, alarm records, operating procedures,
  incident reports — that traditional analytics cannot easily exploit. LLM agents can work with this data
  directly. As experienced operators retire, these agents offer a mechanism for encoding and applying
  organizational knowledge. Natural language interfaces could change how engineers interact with process data
  and systems, invoking simulations, querying historians, and executing calculations. But the limitations are
  real: hallucination, weak numerical reasoning, no safety guarantees by default, and the challenge of
  validating agent behavior in autonomous settings.

keywords:
  - Large Language Models
  - Autonomous Agents
