abstract: |
  Large Language Models have evolved from text generators to agents that reason, use tools, and take actions.
  Researchers are now applying these agents to process industries: interpreting flowsheets, predicting control
  structures, diagnosing faults, even acting as autonomous operators. The results so far are intriguing but
  preliminary, and the gap between laboratory demonstrations and plant deployment remains substantial.

  This full-day workshop brings together researchers from three continents to examine what LLM agents can
  actually do today, where they fail, and what problems deserve our attention. The morning session covers
  fundamentals and includes a hands-on session where participants build simple agents and probe their
  limitations. The afternoon session surveys applications in process design, autonomous control, and
  simulation. We close with a structured discussion aimed at identifying research priorities.

  Participants will leave with practical experience, a grounded assessment of the technology, and ideas
  for their own work.

why_now: |
  LLMs have moved past the initial hype phase, and the process control community now has enough published
  work and practical experience to evaluate what actually works. At the same time, the technology is still
  immature enough that we can shape its development rather than simply adopt tools designed for other domains.

  Plants generate vast amounts of unstructured text — maintenance logs, alarm records, operating procedures,
  incident reports — that traditional analytics cannot easily exploit. LLM agents can work with this data
  directly. As experienced operators retire, these agents offer a mechanism for encoding and applying
  organizational knowledge. Natural language interfaces could change how engineers interact with process data
  and systems, invoking simulations, querying historians, and executing calculations. But the limitations are
  real: hallucination, weak numerical reasoning, no safety guarantees by default, and the challenge of
  validating agent behavior in autonomous settings.

keywords:
  - Large Language Models
  - Autonomous Agents
  - Process Control
  - Artificial Intelligence
  - Industrial Automation
  - Machine Learning
  - Fault Diagnosis

learning_outcomes:
  - "Explain how LLM agents work and critically evaluate claims about their capabilities."
  - "Build simple LLM agents for process engineering tasks using standard tools."
  - "Recognize current LLM applications in process design, control, and simulation."
  - "Identify the key challenges — safety validation, hallucination, integration — that must be addressed for industrial deployment."
  - "Articulate open research problems and opportunities in this emerging field."

target_audience:
  - "Academic researchers and graduate students in process control and process systems engineering exploring AI applications."
  - "Industry practitioners — control engineers, automation specialists, and technology developers — evaluating LLM tools."
  - "Research managers and technical leaders assessing the technology for their organizations."

prerequisites: |
  Participants should understand basic process control concepts (feedback loops, PIDs, cascade control) and
  have some familiarity with machine learning ideas (training, inference, overfitting). Prior experience with
  LLMs or Python programming is helpful but not required — the morning sessions provide necessary background
  and hands-on exercises can be completed collaboratively. Attendees who prefer to observe rather than code
  are also welcome.

hands_on:
  bring:
    - "A laptop with a modern web browser."
    - "Ability to connect to the workshop Wi-Fi."
  provided:
    - "Jupyter notebooks hosted on Google Colab — no local install required."
    - "Temporary LLM API access for use during the workshop."
    - "Sample datasets: simplified P&IDs, alarm lists, maintenance logs."
    - "An offline fallback bundle of pre-recorded demos and local notebooks using open-source models in case of connectivity issues."
  exercises:
    - title: "Prompt engineering basics"
      description: "Prompt a model to interpret a simplified P&ID and critique its control structure suggestions. Experiment with different prompting strategies."
    - title: "Building a simple agent"
      description: "Construct a minimal fault diagnosis agent that combines an LLM with tool calls to query sensor data and search maintenance logs."
    - title: "Failure analysis"
      description: "Probe agent limitations — numerical reasoning errors, hallucinated equipment names, overconfident recommendations — to develop intuition for where these systems fail."

schedule:
  - block: "Morning — Foundations & Hands-On"
    sessions:
      - time: "9:00 – 9:15"
        title: "Welcome and Framing"
        lead: "Organizers"
        details: "Overview of the day, learning outcomes, and an introduction to where LLM agent technology stands in the process industries."
      - time: "9:15 – 10:15"
        title: "LLM and Agent Fundamentals"
        lead: "Gopaluni"
        details: "Attention mechanism and transformer architecture; introduction to simple agent architectures via process control examples (alarm lists, operator procedures, simplified P&ID encodings)."
      - time: "10:15 – 10:30"
        title: "☕ Coffee Break"
        lead: ""
        details: ""
        break: true
      - time: "10:30 – 11:30"
        title: "Hands-On Session"
        lead: "All organizers"
        details: "Participants work directly with LLM APIs on process control tasks using provided Python notebooks. Three exercises progressing from prompt engineering through agent construction to failure analysis."
      - time: "11:30 – 12:30"
        title: "Application I — Process Design and Engineering"
        lead: "Gopaluni"
        details: "P&ID interpretation, control structure prediction, and automated design review. Discussion of Hirtreiter et al. (2024), Balhorn et al. (2024), and graph-based approaches for capturing process topology."
      - time: "12:30 – 13:30"
        title: "🥢 Lunch"
        lead: ""
        details: ""
        break: true
  - block: "Afternoon — Applications & Open Problems"
    sessions:
      - time: "13:30 – 14:30"
        title: "Application II — Autonomous Control and Fault Diagnosis"
        lead: "Mercangöz"
        details: "Agentic frameworks for industrial automation: LLM-based fault diagnosis integrating sensor data with maintenance history, autonomous agents that reason about process upsets, integration of LLM agents with digital twins, and industrial control system integration."
      - time: "14:30 – 14:45"
        title: "☕ Coffee Break"
        lead: ""
        details: ""
        break: true
      - time: "14:45 – 15:45"
        title: "Application III — Process Simulation and Optimization"
        lead: "Gopaluni & Zhao"
        details: "Automated simulation configuration, multimodal approaches combining process measurements with text and images, and natural language interfaces for querying process historians and generating analysis reports."
      - time: "15:45 – 16:45"
        title: "Open Problems, Research Directions, and Q&A"
        lead: "All organizers + participants"
        details: "Structured discussion: What works now? What's tractable? What's hard? Followed by an open floor for questions about content, research directions, industrial deployment, and collaboration."
      - time: "16:45 – 17:00"
        title: "Wrap-up and Resources"
        lead: "Organizers"
        details: "Synthesis of the day's themes plus pointers to resources for continued learning — key papers, open-source tools, benchmark datasets, and community forums."

