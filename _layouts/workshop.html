<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link rel="shortcut icon" type="image/x-icon" href="{{ site.base_url }}/assets/img/favicon.ico">
  <link rel="stylesheet" href="/assets/css/dais.css" />
  <script defer src="https://use.fontawesome.com/releases/v5.3.1/js/all.js"></script>
  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha256-pasqAKBDmFT4eHoN2ndd6lN370kFiGUFyTiUHWhU7k8=" crossorigin="anonymous"></script>

  <meta name="google-site-verification" content="{{ site.googleverification }}" />
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | prepend: site.url }}">

  {% seo %}
  {% include analytics.html %}
</head>
<body class="workshop-body">

  {% include navbar.html %}

  {{ content }}

  {% include footer.html %}

  <script type="text/javascript">
    $(document).ready(function() {
      $(".navbar-burger").click(function() {
        $(".navbar-burger").toggleClass("is-active");
        $(".navbar-menu").toggleClass("is-active");
      });
    });

    // Sticky sub-nav: native-CSS smooth scroll + active-section tracking.
    // (Site-wide jQuery is the slim build, which has no .animate/.scroll helpers.)
    (function () {
      var sections = document.querySelectorAll('section[id^="ws-"]');
      var navLinks = document.querySelectorAll('.ws-subnav a.ws-anchor');
      if (!sections.length || !navLinks.length) return;

      function setActive() {
        var scrollPos = window.scrollY + 140;
        var current = null;
        sections.forEach(function (s) {
          if (s.offsetTop <= scrollPos) current = s.id;
        });
        navLinks.forEach(function (l) {
          var href = l.getAttribute('href') || '';
          if (current && href === '#' + current) l.classList.add('is-active');
          else l.classList.remove('is-active');
        });
      }
      window.addEventListener('scroll', setActive, { passive: true });
      setActive();
    })();
  </script>
</body>
</html>
